<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: #fdf6f0; color: #333; padding: 20px; }
h1 { text-align: center; margin-bottom: 5px; color: #030202; }
.subtitle { text-align: center; color: #666; margin-bottom: 20px; font-size: 14px; }
.stats { text-align: center; margin-bottom: 20px; font-size: 15px; }
.stats span { display: inline-block; margin: 0 10px; padding: 4px 12px; border-radius: 20px; font-weight: 600; }
.stats .ok { background: #d4edda; color: #155724; }
.stats .wrong { background: #f8d7da; color: #721c24; }
.stats .unchecked { background: #e8e0d5; color: #555; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; max-width: 1400px; margin: 0 auto; }
.card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); transition: transform 0.2s; }
.card.flagged { border: 3px solid #dc3545; }
.card.approved { border: 3px solid #28a745; }
.card-img { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; background: #e8e0d5; }
.card-img.broken { display: flex; align-items: center; justify-content: center; color: #999; font-size: 13px; }
.card-body { padding: 12px; }
.card-body h3 { font-size: 15px; margin-bottom: 4px; line-height: 1.3; }
.card-body .img-name { font-size: 11px; color: #999; margin-bottom: 8px; word-break: break-all; }
.card-body .no-photo { font-size: 12px; color: #c0392b; font-style: italic; }
.btns { display: flex; gap: 6px; }
.btns button { flex: 1; padding: 8px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
.btn-ok { background: #d4edda; color: #155724; }
.btn-ok:hover { background: #b7dfbf; }
.btn-wrong { background: #f8d7da; color: #721c24; }
.btn-wrong:hover { background: #f1b0b7; }
.btn-ok.active { background: #28a745; color: white; }
.btn-wrong.active { background: #dc3545; color: white; }
.copy-section { text-align: center; margin: 30px auto; max-width: 600px; }
.copy-btn { background: #030202; color: white; border: none; padding: 14px 28px; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: 600; }
.copy-btn:hover { background: #333; }
.copy-result { margin-top: 10px; font-size: 13px; color: #28a745; }
.filter-bar { text-align: center; margin-bottom: 16px; }
.filter-bar button { padding: 6px 16px; margin: 0 4px; border: 2px solid #ccc; background: white; border-radius: 20px; cursor: pointer; font-size: 13px; }
.filter-bar button.active { border-color: #030202; background: #030202; color: white; }
</style>
</head>
<body>

<p class="subtitle">Check each recipe's photo. Click ✓ if it looks right, ✗ if it's wrong. Then copy the list of wrong ones to paste back to Claude.</p>

<div class="stats" id="stats"></div>

<div class="filter-bar" id="filterBar">
  <button class="active" onclick="filterCards('all')">All</button>
  <button onclick="filterCards('unchecked')">Unchecked</button>
  <button onclick="filterCards('wrong')">Wrong</button>
  <button onclick="filterCards('ok')">OK</button>
</div>

<div class="grid" id="grid"></div>

<div class="copy-section">
  <button class="copy-btn" onclick="copyWrongList()">Copy Wrong List to Clipboard</button>
  <div class="copy-result" id="copyResult"></div>
</div>

const state = {};

function renderCards(filter) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  
  recipes.forEach((r, i) => {
    if (!state[r.slug]) state[r.slug] = 'unchecked';
    
    if (filter && filter !== 'all' && state[r.slug] !== filter) return;
    
    const card = document.createElement('div');
    card.className = 'card' + (state[r.slug] === 'wrong' ? ' flagged' : '') + (state[r.slug] === 'ok' ? ' approved' : '');
    card.id = 'card-' + r.slug;
    
    let imgHtml;
    if (r.img) {
      imgHtml = `<img class="card-img" src="${BASE}${r.img}" alt="${r.title}" onerror="this.style.background='#f8d7da';this.alt='IMAGE NOT FOUND: ${r.img}'">`;
    } else {
      imgHtml = `<div class="card-img broken">No photo assigned</div>`;
    }
    
    card.innerHTML = `
      ${imgHtml}
      <div class="card-body">
        <h3>${r.title}</h3>
        <div class="img-name">${r.img || 'none'}</div>
        ${r.img ? `
        <div class="btns">
          <button class="btn-ok ${state[r.slug]==='ok'?'active':''}" onclick="mark('${r.slug}','ok')">✓ Looks right</button>
          <button class="btn-wrong ${state[r.slug]==='wrong'?'active':''}" onclick="mark('${r.slug}','wrong')">✗ Wrong photo</button>
        </div>` : '<div class="no-photo">No suitable image available</div>'}
      </div>
    `;
    grid.appendChild(card);
  });
  
  updateStats();
}

function mark(slug, status) {
  state[slug] = status;
  const card = document.getElementById('card-' + slug);
  card.className = 'card' + (status === 'wrong' ? ' flagged' : '') + (status === 'ok' ? ' approved' : '');
  card.querySelectorAll('.btn-ok')[0].className = 'btn-ok' + (status === 'ok' ? ' active' : '');
  card.querySelectorAll('.btn-wrong')[0].className = 'btn-wrong' + (status === 'wrong' ? ' active' : '');
  updateStats();
}

function updateStats() {
  const ok = Object.values(state).filter(v => v === 'ok').length;
  const wrong = Object.values(state).filter(v => v === 'wrong').length;
  const unchecked = recipes.filter(r => r.img).length - ok - wrong;
  document.getElementById('stats').innerHTML = `
    <span class="ok">✓ ${ok} OK</span>
    <span class="wrong">✗ ${wrong} Wrong</span>
    <span class="unchecked">${unchecked} unchecked</span>
  `;
}

function filterCards(f) {
  document.querySelectorAll('.filter-bar button').forEach(b => b.className = '');
  event.target.className = 'active';
  renderCards(f);
}

function copyWrongList() {
  const wrongOnes = recipes.filter(r => state[r.slug] === 'wrong').map(r => r.title);
  if (wrongOnes.length === 0) {
    document.getElementById('copyResult').textContent = 'No recipes marked as wrong!';
    return;
  }
  const text = "Wrong images:\n" + wrongOnes.join('\n');
  navigator.clipboard.writeText(text).then(() => {
    document.getElementById('copyResult').textContent = `Copied ${wrongOnes.length} wrong recipes to clipboard! Paste this back to Claude.`;
  }).catch(() => {
    document.getElementById('copyResult').textContent = text;
  });
}

renderCards('all');
</script>
