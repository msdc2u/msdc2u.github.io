<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Garlic Sausage Pasta – What's For Tea</title>
  <meta name="description" content="Garlic Sausage Pasta – a proper family tea that's simple, filling and on the table fast.">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --pink: #F6979A; --black: #030202; --cream: #FDF5EA; --mustard: #E5C868; --font-heading: 'Plus Jakarta Sans', sans-serif; --font-body: 'Work Sans', sans-serif; }
    html, body { }
    body { background: var(--cream); font-family: var(--font-body); color: var(--black); }
    .site-header { background: var(--cream); border-bottom: 1.5px solid rgba(3,2,2,0.08); position: sticky; top: 0; z-index: 100; }
    .header-inner { max-width: 1200px; margin: 0 auto; padding: 0 48px; height: 76px; display: flex; align-items: center; justify-content: space-between; gap: 32px; }
    .site-logo { display: flex; align-items: center; text-decoration: none; flex-shrink: 0; }
    .site-logo img { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; }
    .site-nav { display: flex; align-items: center; gap: 4px; list-style: none; flex: 1; justify-content: center; }
    .site-nav a { font-family: var(--font-body); font-size: 15px; font-weight: 500; color: var(--black); text-decoration: none; padding: 6px 16px; border-radius: 999px; transition: background 0.18s; white-space: nowrap; }
    .site-nav a:hover { background: rgba(246,151,154,0.15); }
    .site-nav a.active { color: var(--pink); font-weight: 600; }
    .btn-cta { display: inline-flex; align-items: center; gap: 8px; background: var(--pink); color: var(--black); font-family: var(--font-body); font-size: 15px; font-weight: 600; padding: 11px 24px; border-radius: 999px; text-decoration: none; white-space: nowrap; flex-shrink: 0; }
    .breadcrumb { max-width: 1200px; margin: 0 auto; padding: 20px 48px 0; font-size: 13px; color: rgba(3,2,2,0.45); }
    .breadcrumb a { color: rgba(3,2,2,0.45); text-decoration: none; }
    .breadcrumb a:hover { color: var(--pink); }
    .breadcrumb span { margin: 0 6px; }
    .recipe-hero { max-width: 1200px; margin: 24px auto 0; padding: 0 48px; display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: start; }
    .recipe-image { border-radius: 20px; overflow: hidden; aspect-ratio: 4/3; background: #e8e0d5; display: flex; align-items: center; justify-content: center; font-size: 13px; color: rgba(3,2,2,0.3); }
    .recipe-intro { padding-top: 8px; }
    .recipe-category { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--pink); margin-bottom: 12px; }
    .recipe-intro h1 { font-family: var(--font-heading); font-size: 2.2rem; font-weight: 800; line-height: 1.15; margin-bottom: 16px; }
    .recipe-intro p { font-size: 15px; line-height: 1.7; color: rgba(3,2,2,0.65); margin-bottom: 24px; }
    .recipe-meta { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 28px; }
    .meta-badge { display: flex; align-items: center; gap: 7px; background: white; border-radius: 999px; padding: 8px 16px; font-size: 13px; font-weight: 600; box-shadow: 0 1px 4px rgba(3,2,2,0.07); }
    .cost-pill { display: inline-flex; align-items: center; gap: 7px; background: var(--mustard); border-radius: 999px; padding: 10px 20px; font-size: 14px; font-weight: 700; margin-bottom: 28px; }
    .recipe-body { max-width: 1200px; margin: 48px auto; padding: 0 48px; display: grid; grid-template-columns: 320px 1fr; gap: 48px; align-items: start; }
    .ingredients-box { background: white; border-radius: 20px; padding: 32px; box-shadow: 0 2px 12px rgba(3,2,2,0.06); position: sticky; top: 96px; }
    .ingredients-box h2 { font-family: var(--font-heading); font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; }
    .serves-row { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid rgba(3,2,2,0.07); }
    .serves-label { font-size: 13px; color: rgba(3,2,2,0.5); }
    .serves-count { font-size: 15px; font-weight: 700; }
    .ingredient-list { list-style: none; display: flex; flex-direction: column; gap: 12px; }
    .ingredient-list li { display: flex; align-items: baseline; gap: 8px; font-size: 15px; line-height: 1.45; padding-bottom: 12px; border-bottom: 1px solid rgba(3,2,2,0.05); }
    .ingredient-list li:last-child { border-bottom: none; padding-bottom: 0; }
    .ing-amount { font-weight: 700; font-size: 14px; white-space: nowrap; min-width: 48px; }
    .ing-name { color: rgba(3,2,2,0.8); }
    .method-section h2 { font-family: var(--font-heading); font-size: 1.4rem; font-weight: 700; margin-bottom: 28px; }
    .steps { display: flex; flex-direction: column; gap: 20px; }
    .step { display: flex; gap: 20px; align-items: flex-start; }
    .step-number { width: 36px; height: 36px; border-radius: 50%; background: var(--pink); display: flex; align-items: center; justify-content: center; font-family: var(--font-heading); font-size: 14px; font-weight: 800; flex-shrink: 0; color: white; }
    .step-text { font-size: 15px; line-height: 1.7; color: rgba(3,2,2,0.8); padding-top: 6px; }
    .notes-box { background: var(--mustard); border-radius: 16px; padding: 24px 28px; margin-top: 32px; }
    .notes-box h3 { font-family: var(--font-heading); font-size: 15px; font-weight: 700; margin-bottom: 12px; }
    .notes-box ul { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .notes-box li { font-size: 14px; line-height: 1.55; padding-left: 20px; position: relative; color: rgba(3,2,2,0.8); }
    .notes-box li::before { content: "✓"; position: absolute; left: 0; font-weight: 700; }
    .signup-wrap { max-width: 1200px; margin: 0 auto; padding: 0 48px 64px; }
    .signup-box { background: var(--mustard); border-radius: 24px; padding: 64px 48px; text-align: center; }
    .signup-box h2 { font-family: var(--font-heading); font-size: 2rem; font-weight: 800; margin-bottom: 12px; }
    .signup-box p { font-size: 15px; color: rgba(3,2,2,0.7); margin-bottom: 28px; max-width: 400px; margin-left: auto; margin-right: auto; }
    .signup-form { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 14px; }
    .signup-form input { padding: 13px 22px; border-radius: 999px; border: none; font-family: var(--font-body); font-size: 15px; width: 260px; outline: none; }
    .signup-form button { padding: 13px 26px; border-radius: 999px; background: var(--black); color: var(--cream); font-family: var(--font-body); font-size: 15px; font-weight: 600; border: none; cursor: pointer; }
    .signup-note { font-size: 13px; color: rgba(3,2,2,0.45); }
    .site-footer { background: var(--pink); padding: 48px; }
    .footer-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 32px; flex-wrap: wrap; }
    .footer-logo { display: flex; align-items: center; gap: 10px; }
    .footer-logo img { width: 40px; height: 40px; border-radius: 50%; }
    .footer-logo span { font-family: var(--font-heading); font-size: 15px; font-weight: 700; color: var(--black); }
    .footer-nav { display: flex; flex-direction: column; gap: 10px; text-align: center; }
    .footer-nav div { display: flex; gap: 24px; justify-content: center; flex-wrap: wrap; }
    .footer-nav a { font-size: 14px; color: rgba(3,2,2,0.65); text-decoration: none; font-family: var(--font-body); }
    .footer-copy { font-size: 13px; color: rgba(3,2,2,0.5); }
  </style>
